<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>宝石16タイプ診断</title>
  <meta name="description" content="16の問いから、あなたに宿る原石のかたちを見つける宝石診断">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="bg-gems" aria-hidden="true">
  <!-- ゴールド六角形 (右上) -->
  <svg class="bg-gem bg-gem--1" viewBox="0 0 100 100">
    <polygon points="50,10 80,35 75,75 50,90 25,75 20,35" fill="#d4b878" fill-opacity="0.10" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.25"/>
    <line x1="50" y1="10" x2="50" y2="90" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.15"/>
    <line x1="20" y1="35" x2="80" y2="35" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.15"/>
  </svg>
  <!-- アメジスト ダイヤ (左上) -->
  <svg class="bg-gem bg-gem--2" viewBox="0 0 100 100">
    <polygon points="50,5 95,50 50,95 5,50" fill="#c4a0d0" fill-opacity="0.09" stroke="#b088cc" stroke-width="1.2" stroke-opacity="0.22"/>
    <line x1="5" y1="50" x2="95" y2="50" stroke="#b088cc" stroke-width="0.6" stroke-opacity="0.13"/>
    <line x1="50" y1="5" x2="50" y2="95" stroke="#b088cc" stroke-width="0.6" stroke-opacity="0.13"/>
  </svg>
  <!-- ローズクォーツ 六角形 (右中) -->
  <svg class="bg-gem bg-gem--3" viewBox="0 0 100 100">
    <polygon points="50,10 80,35 75,75 50,90 25,75 20,35" fill="#e8b4b0" fill-opacity="0.09" stroke="#d4888a" stroke-width="1.2" stroke-opacity="0.22"/>
    <line x1="50" y1="10" x2="50" y2="90" stroke="#d4888a" stroke-width="0.6" stroke-opacity="0.13"/>
  </svg>
  <!-- アクアマリン ダイヤ (左下) -->
  <svg class="bg-gem bg-gem--4" viewBox="0 0 100 100">
    <polygon points="50,5 95,50 50,95 5,50" fill="#9ecfd0" fill-opacity="0.09" stroke="#6ab4b8" stroke-width="1.2" stroke-opacity="0.22"/>
    <line x1="5" y1="50" x2="95" y2="50" stroke="#6ab4b8" stroke-width="0.6" stroke-opacity="0.13"/>
    <line x1="50" y1="5" x2="50" y2="95" stroke="#6ab4b8" stroke-width="0.6" stroke-opacity="0.13"/>
  </svg>
  <!-- エメラルド 六角形 (右下) -->
  <svg class="bg-gem bg-gem--5" viewBox="0 0 100 100">
    <polygon points="50,10 80,35 75,75 50,90 25,75 20,35" fill="#8dc4a0" fill-opacity="0.09" stroke="#5aaa78" stroke-width="1.2" stroke-opacity="0.22"/>
    <line x1="20" y1="35" x2="80" y2="35" stroke="#5aaa78" stroke-width="0.6" stroke-opacity="0.13"/>
    <line x1="25" y1="75" x2="75" y2="75" stroke="#5aaa78" stroke-width="0.6" stroke-opacity="0.13"/>
  </svg>
  <!-- 小さいゴールド ダイヤ (左中上) -->
  <svg class="bg-gem bg-gem--6" viewBox="0 0 100 100">
    <polygon points="50,5 95,50 50,95 5,50" fill="#d4b878" fill-opacity="0.08" stroke="#c9a84c" stroke-width="1.4" stroke-opacity="0.20"/>
  </svg>
  <!-- 小さいアメジスト 六角形 (右中下) -->
  <svg class="bg-gem bg-gem--7" viewBox="0 0 100 100">
    <polygon points="50,10 80,35 75,75 50,90 25,75 20,35" fill="#c4a0d0" fill-opacity="0.08" stroke="#b088cc" stroke-width="1.4" stroke-opacity="0.20"/>
  </svg>
</div>

<div class="container">

  <header class="header">
    <div class="header-icon">✦</div>
    <div class="eyebrow">GEM TYPE DIAGNOSIS</div>
    <h1>あなたの<span class="accent">宝石</span>を見つけよう</h1>
    <p class="subtitle">16の問いから導かれる、<br>あなたに宿る原石のかたち</p>
  </header>

  <!-- 入力画面 -->
  <section class="screen active" id="screen-input">
    <div class="card">
      <div class="card-title">はじめに</div>
      <div class="card-subtitle">あなたのことを少し教えてください</div>

      <div class="form-group">
        <label for="nickname">ニックネーム<span class="req">必須</span></label>
        <input type="text" id="nickname" placeholder="例:はな" maxlength="20">
      </div>

      <div class="form-group">
        <label for="birthday">生年月日<span class="req">必須</span></label>
        <input type="date" id="birthday">
      </div>

      <div class="btn-wrap">
        <button class="btn" id="btn-start" disabled>
          診断をはじめる<span class="btn-icon">→</span>
        </button>
      </div>
    </div>
  </section>

  <!-- 質問画面 -->
  <section class="screen" id="screen-question">
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <div class="progress-label">
          <button class="btn-back" id="btn-back" hidden>
            <span class="btn-back-arrow">←</span>戻る
          </button>
          <span class="progress-num"><span id="current-num">1</span> / 12</span>
        </div>
      </div>

      <div class="question-num-badge" id="question-num">Q1</div>
      <div class="question-text" id="question-text"></div>
      <div class="choices" id="choices"></div>
    </div>
  </section>

  <!-- ローディング画面 -->
  <section class="screen" id="screen-loading">
    <div class="card">
      <div class="loading">
        <div class="loading-gem">
          <svg viewBox="0 0 100 100">
            <defs>
              <linearGradient id="load-grad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#d4b878"/>
                <stop offset="100%" stop-color="#b08947"/>
              </linearGradient>
            </defs>
            <polygon points="50,10 80,35 75,75 50,90 25,75 20,35" fill="url(#load-grad)"/>
            <polygon points="50,10 80,35 75,75 50,90 25,75 20,35" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
          </svg>
        </div>
        <div class="loading-text">結晶を磨いています...</div>
        <div class="loading-sub">あなたの宝石を導き出しています</div>
      </div>
    </div>
  </section>

  <!-- 結果画面 -->
  <section class="screen" id="screen-result">
    <div class="card">
      <div class="result-eyebrow-wrap">
        <div class="result-eyebrow">YOUR GEM</div>
      </div>
      <div class="result-greeting"><span class="name" id="result-nickname"></span>さん、あなたの宝石は——</div>

      <div class="gem-visual" id="gem-visual"></div>

      <div class="gem-name-jp" id="gem-name-jp"></div>
      <div class="gem-name-en" id="gem-name-en"></div>

      <div class="gem-catch-wrap">
        <div class="gem-catch" id="gem-catch"></div>
      </div>

      <div class="gem-description" id="gem-description"></div>

      <div class="section-title">あなたを表す3つの輝き</div>
      <div class="traits" id="traits"></div>

      <div class="section-title">プロフィール</div>
      <div class="meta-card">
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">あなたの誕生石</div>
            <div class="meta-value" id="birthstone"></div>
          </div>
          <div class="meta-item">
            <div class="meta-label">エレメント</div>
            <div class="meta-value" id="element"></div>
          </div>
        </div>
      </div>

      <div class="combo-message" id="combo-message"></div>

      <button class="restart-btn" id="btn-restart">もう一度診断する</button>
    </div>
  </section>

  <footer class="footer">GEM TYPE · 16 Archetypes</footer>

</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>

</body>
</html>
